---
- name: 必要なパッケージをインストール
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Docker GPGキーを追加
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Dockerリポジトリを追加
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present

- name: Docker CE + Compose pluginをインストール
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Dockerサービスを有効化・起動
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: デプロイユーザーをdockerグループに追加
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

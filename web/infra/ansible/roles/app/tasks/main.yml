---
- name: アプリディレクトリを作成
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: リポジトリをclone/pull
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_branch }}"
    force: true
  become_user: "{{ ansible_user }}"

- name: .envファイルを配置
  ansible.builtin.template:
    dest: "{{ app_dir }}/web/.env"
    content: |
      ADMIN_USER={{ admin_user }}
      ADMIN_PASSWORD={{ admin_password }}
      TUNNEL_TOKEN={{ tunnel_token }}
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: docker compose up
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ app_dir }}/web"
  become_user: "{{ ansible_user }}"

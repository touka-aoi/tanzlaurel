services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/data
      - ./.env.production:/app/.env.production:ro
      - ./.env.keys:/app/.env.keys:ro
    working_dir: /app
    restart: unless-stopped

  nginx:
    build:
      context: ./cockpit
      dockerfile: Dockerfile
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

